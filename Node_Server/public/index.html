<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dookey Ascension - Menu Principal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-hover: #5a52d5;
            --secondary: #ff6584;
            --secondary-hover: #e0526f;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at bottom, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Effet de particules en arrière-plan */
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: var(--secondary);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            z-index: 10;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            padding: 1.25rem;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
        }

        .btn-game {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            box-shadow: 0 10px 25px -5px rgba(108, 99, 255, 0.4);
        }

        .btn-controller {
            background: linear-gradient(135deg, var(--secondary), #fb7185);
            box-shadow: 0 10px 25px -5px rgba(255, 101, 132, 0.4);
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.6s;
        }

        .btn:hover::after {
            left: 150%;
        }

        .icon {
            font-size: 1.4rem;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: rgba(148, 163, 184, 0.5);
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <h1 class="title">Dookey Ascension</h1>
        <p class="subtitle">Sélectionnez la destination vers laquelle vous souhaitez vous rendre.</p>

        <div class="button-group">
            <a href="/display" class="btn btn-game">
                <span class="icon">💻</span>
                Lancer l'Écran de Jeu
            </a>
            
            <a href="/controller" class="btn btn-controller">
                <span class="icon">📱</span>
                Rejoindre avec son Téléphone
            </a>
        </div>

        <div class="footer">
            Système Multijoueur Websocket Actif
        </div>
    </div>
</body>
</html>
