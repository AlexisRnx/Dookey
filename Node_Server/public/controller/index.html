<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manette Dookey</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Outfit', sans-serif; color: white;}
        
        /* LOGIN SCREEN */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            position: absolute;
            top: 0; left: 0;
            z-index: 50;
        }
        
        .login-box {
            background: rgba(30, 41, 59, 0.7);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { margin-top: 0; font-weight: 900; background: linear-gradient(90deg, #ff6584, #6c63ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        
        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; font-weight: 700;}
        
        input {
            width: 100%; padding: 12px;
            border-radius: 8px; border: none;
            background: rgba(15, 23, 42, 0.8);
            color: white; font-size: 1.2rem;
            text-align: center;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        input:focus { border: 2px solid #6c63ff; }
        
        .btn-join {
            width: 100%; padding: 14px;
            border-radius: 8px; border: none;
            background: #6c63ff;
            color: white; font-size: 1.1rem;
            font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-join:active { transform: scale(0.95); }

        /* GAME SCREEN (OLD CONTROLLER) */
        #game-screen { display: none; height: 100vh; overflow: hidden; }
        #ws-status-bar {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.6); padding: 5px 10px;
            border-radius: 10px; font-size: 12px; color: white;
            display: flex; align-items: center; z-index: 10;
        }
        #ws-status { width: 10px; height: 10px; background: red; border-radius: 50%; display: inline-block; margin-right: 8px; }

        #container-jeu {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 2; pointer-events: none; width: 100%;
        }
        h2 { margin: 0 0 10px 0; font-size: 24px; pointer-events: none; }
        #txt-info { font-size: 16px; margin-bottom: 20px; font-weight: bold; color: yellow; pointer-events: none;}

        #ecran-cliquable { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; cursor: pointer; transition: opacity 0.3s; }
    </style>
</head>
<body>

    <!-- LOBBY LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h1>Rejoindre</h1>
            <div class="input-group">
                <label>Code de la Salle :</label>
                <input type="text" id="input-code" placeholder="EX: A7B2Z9X1" maxlength="8" style="text-transform: uppercase;">
            </div>
            <div class="input-group">
                <label>Votre Pseudo :</label>
                <input type="text" id="input-pseudo" placeholder="Ex: Bob" maxlength="12">
            </div>
            <button id="btn-join" class="btn-join">Se Connecter</button>
            <p id="login-error" style="color: #ff6584; font-size: 0.9rem; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <!-- MAIN GAME CONTROLLER -->
    <div id="game-screen">
        <div id="ws-status-bar">
            <span id="ws-status"></span>
            <span id="ws-label">En attente...</span>
        </div>
        
        <div id="container-jeu">
            <h2 id="nom-equipe-tour">En attente du jeu...</h2>
            <div id="txt-info"></div>
            
            <div id="container-barre">
                <div id="curseur"></div>
                <div class="case-score">X</div>
                <div class="case-score">X</div>
                <div class="case-score">X</div>
                <div class="case-score">X</div>
                <div class="case-score">X</div>
                <div class="case-score">X</div>
            </div>
        </div>
        
        <div id="ecran-cliquable"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
